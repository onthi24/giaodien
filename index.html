<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ONTHI24 - Hệ thống học tập</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* GIỮ NGUYÊN CSS CŨ CỦA BẠN ĐỂ ĐẢM BẢO GIAO DIỆN */
        :root { --primary-green: #1a4d2e; --primary-blue: #78281f; --primary-orange: #B5782A; }
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #fdfdfd; margin: 0; padding: 20px; }
        .container { display: flex; gap: 20px; max-width: 1100px; margin: 0 auto; width: 100%; flex-wrap: wrap; }
        .column { flex: 1; min-width: 300px; display: flex; flex-direction: column; gap: 12px; }
        .column-header { padding: 14px 18px; border-radius: 10px; color: white; font-weight: bold; font-size: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.15); }
        .item-card { background: #fff; padding: 14px 18px; border-radius: 16px; border: 1.5px solid #b5b5b5; text-decoration: none; display: block; box-shadow: 0 3px 8px rgba(0,0,0,0.08); transition: 0.2s; color: #222; }
        .item-card:hover { background-color: #f8fafc; border-color: #78281f; }
    </style>
</head>
<body>

    <div class="container" id="main-container">
        <div style="text-align:center; width:100%; padding: 50px;">Đang tải dữ liệu từ hệ thống...</div>
    </div>

    <script>
        const SHEET_ID = '1EGg-F339DzjVtnENu_LBYXq0QBO1z0fK4232aKpMLxs';
        
        async function loadData() {
            const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;
            try {
                const response = await fetch(url);
                const text = await response.text();
                const json = JSON.parse(text.substring(47, text.length - 2));
                const rows = json.table.rows;

                const container = document.getElementById('main-container');
                container.innerHTML = ''; // Xóa chữ "Đang tải"

                let groups = {};

                // Xử lý dữ liệu từ Sheet
                rows.forEach(row => {
                    const groupName = row.c[0]?.v || "Khác";
                    const itemName = row.c[1]?.v || "";
                    const itemLink = row.c[2]?.v || "#";

                    if (!groups[groupName]) groups[groupName] = [];
                    if (itemName) groups[groupName].push({ name: itemName, link: itemLink });
                });

                // Render ra HTML
                let colorIndex = 0;
                const colors = ['bg-green', 'bg-blue', 'bg-orange'];
                
                for (let group in groups) {
                    const col = document.createElement('div');
                    col.className = 'column';
                    
                    col.innerHTML = `<div class="column-header ${colors[colorIndex % 3]}">${group}</div>`;
                    
                    groups[group].forEach(item => {
                        col.innerHTML += `<a class="item-card" href="${item.link}"><h2>${item.name}</h2></a>`;
                    });
                    
                    container.appendChild(col);
                    colorIndex++;
                }
            } catch (err) {
                console.error("Lỗi tải dữ liệu:", err);
                document.getElementById('main-container').innerHTML = "Lỗi tải dữ liệu. Vui lòng kiểm tra quyền truy cập của Google Sheet.";
            }
        }

        window.onload = loadData;
    </script>
</body>
</html>
