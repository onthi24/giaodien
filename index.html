
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ONTHI24 - Hệ thống học tập</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary-green: #1abc9c; --primary-blue: #3498db; --primary-orange: #e67e22; }
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #fdfdfd; margin: 0; padding: 20px; font-size: 16px; overflow-x: hidden; }
        .top-navbar { max-width: 1100px; margin: 0 auto 10px auto; width: 100%; background-color: #f1f4f6; padding: 10px 15px; border-radius: 4px; display: flex; justify-content: space-between; align-items: center; position: relative; }
        .logo-box { display: flex; align-items: center; }
        .logo-img { height: 45px; object-fit: contain; display: block; }
        .mobile-menu-btn { display: none; font-size: 24px; cursor: pointer; color: #333; padding: 10px; }
        .nav-menu { display: flex; list-style: none; margin: 0; padding: 0; gap: 5px; }
        .nav-item-wrap { position: relative; }
        .nav-item { text-decoration: none; color: #333; padding: 14px 15px; font-weight: 500; font-size: 16px; display: flex; align-items: center; gap: 5px; transition: all 0.2s; border-bottom: 4px solid transparent; cursor: pointer; }
        .nav-item.active { font-weight: bold; background-color: #fff; border-bottom: 4px solid #000; }
        .nav-item:hover { background-color: #e2e8f0; }
        .dropdown-content { display: none; position: absolute; background-color: #f1f1f1; min-width: 180px; box-shadow: 0px 8px 16px rgba(0,0,0,0.15); z-index: 1000; top: 100%; left: 0; border-radius: 0 0 5px 5px; }
        .dropdown-content a { color: #333; padding: 12px 16px; text-decoration: none; display: block; text-align: left; font-size: 15px; border-bottom: 1px solid #ddd; }
        .dropdown-content a:last-child { border-bottom: none; }
        .dropdown-content a:hover { background-color: #ddd; color: var(--primary-orange); }
        @media (min-width: 769px) { .nav-item-wrap:hover .dropdown-content { display: block; } }
        .mobile-close-btn { display: none; }
        .header-main { display: flex; justify-content: space-between; align-items: center; max-width: 1100px; margin: 0 auto 25px auto; width: 100%; }
        .main-title { font-size: 38px; font-weight: 800; color: #134e4a; margin: 0; }
        .search-box input { width: 270px; padding: 10px 16px; border-radius: 25px; border: 1px solid #c7d2d8; background: #f1f4f6; outline: none; font-size: 15px; }
        .container { display: flex; gap: 20px; max-width: 1100px; margin: 0 auto; width: 100%; }
        .column { flex: 1; display: flex; flex-direction: column; gap: 12px; }
        .column-header { padding: 14px 18px; border-radius: 10px; color: white; font-weight: bold; font-size: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.15); }
        .bg-green { background: #1a4d2e; }
        .bg-blue { background: #78281f; }
        .bg-orange { background: #B5782A; }
        .item-card { background: #fff; padding: 14px 18px; border-radius: 16px; border: 1.5px solid #b5b5b5; text-decoration: none; display: block; box-shadow: 0 3px 8px rgba(0,0,0,0.08); transition: 0.2s; }
        .item-card:hover { background-color: #f8fafc; border-color: #78281f; }
        .item-card h2 { margin: 0; font-weight: 700; color: #222; font-size: 18px; }
        .footer-action { margin: 40px auto 20px auto; max-width: 1100px; width: 100%; display: flex; gap: 30px; align-items: center; }
        .btn-register { background: linear-gradient(to bottom, #b5782a, #b5782a); color: #fff; padding: 14px 35px; border-radius: 25px; border: 1px solid #8e6f3e; font-weight: bold; cursor: pointer; }
        .link-detail { font-weight: bold; text-decoration: none; font-size: 15px; text-transform: uppercase; }
        .copyright { color: #999; font-size: 14px; padding-left: 20px; max-width: 1100px; margin: 0 auto 20px auto; }
        @media (max-width: 768px) { /* CSS responsive giữ nguyên */ }
    </style>
</head>
<body>

    <div class="top-navbar">
        <div class="logo-box"><img src="https://raw.githubusercontent.com/onthi24/quanlyonthi24/main/LOGO24.TRONG.png" alt="ONTHI24 LOGO" class="logo-img"></div>
    </div>

    <div class="header-main">
        <h1 class="main-title">Trang chủ</h1>
        <form class="search-box" action="https://www.google.com/search" method="GET">
            <input type="text" name="q" placeholder="Tìm qua Google...">
        </form>
    </div>

    <div class="container" id="dynamic-container">
        </div>

    <div class="footer-action">
        <a href="https://docs.google.com/forms/d/e/1FAIpQLSdX0G3eI0fttdhqXR_YAexVfp2LlgFBJTWZUpS4gGjICfkZ_Q/viewform" target="_blank"><button class="btn-register">ĐĂNG KÍ TƯ VẤN</button></a>
        <a href="https://sites.google.com/view/namins2" class="link-detail" style="color: #78281f;">GIỚI THIỆU VỀ ONTHI24.COM</a>
    </div>

    <div class="copyright">© 2026 ONTHI24</div>

    <script>
        const SHEET_ID = '1EGg-F339DzjVtnENu_LBYXq0QBO1z0fK4232aKpMLxs';
        const colors = ['bg-green', 'bg-blue', 'bg-orange'];

        async function loadSheetData() {
            const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;
            try {
                const response = await fetch(url);
                const text = await response.text();
                const json = JSON.parse(text.substring(47, text.length - 2));
                const rows = json.table.rows;

                const container = document.getElementById('dynamic-container');
                let groups = {};

                // Nhóm dữ liệu theo cột A
                rows.forEach(row => {
                    const groupName = row.c[0]?.v || "Khác";
                    const itemName = row.c[1]?.v || "";
                    const itemLink = row.c[2]?.v || "#";
                    if (!groups[groupName]) groups[groupName] = [];
                    if (itemName) groups[groupName].push({ name: itemName, link: itemLink });
                });

                // Render HTML giữ nguyên cấu trúc
                let idx = 0;
                for (let group in groups) {
                    const col = document.createElement('div');
                    col.className = 'column';
                    col.innerHTML = `<div class="column-header ${colors[idx % 3]}">${group}</div>`;
                    groups[group].forEach(item => {
                        col.innerHTML += `<a class="item-card" href="${item.link}"><h2>${item.name}</h2></a>`;
                    });
                    container.appendChild(col);
                    idx++;
                }
            } catch (e) { console.error("Lỗi lấy dữ liệu:", e); }
        }
        loadSheetData();
    </script>
</body>
</html>
